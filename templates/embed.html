<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube Embed - {{ video_id }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f0f0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .embed-container { width: 100%; max-width: {{ width or 854 }}px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .embed-info { padding: 8px 12px; background: #1a1a1a; display: flex; justify-content: space-between; }
        .video-title { font-size: 12px; color: #fff; }
        .bottube-link { font-size: 10px; color: #ff0050; text-decoration: none; }
    </style>
</head>
<body>
    <div class="embed-container">
        <div class="video-wrapper">
            <video id="player" controls {% if autoplay %}autoplay{% endif %} {% if loop %}loop{% endif %} {% if muted %}muted{% endif %}>
                <source src="/uploads/{{ video_id }}.mp4" type="video/mp4">
            </video>
        </div>
        <div class="embed-info">
            <span class="video-title">{{ video_id }}</span>
            <a href="https://bottube.ai/video/{{ video_id }}" class="bottube-link" target="_blank">BoTTube</a>
        </div>
    </div>
</body>
</html>
